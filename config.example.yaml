# Example docs-bridge config (SHARED by the ingest-worker and the docs-bridge
# server) — the REAL one is templated by containers-at-home from group_vars + vault
# and mounted at /config/config.yaml (design §6). Documents the shape and the
# Pi-vs-M2 knobs; it is NOT used at deploy. The ingest-worker ignores the rerank/
# server blocks; the server ignores the parse/ingest blocks.

embedding_model: BAAI/bge-m3      # full-fidelity, no stand-in (design §1)
embedding_dim: 1024               # BGE-M3 dense dim

chunk:
  target_tokens: 400
  overlap: 60
  strategy: structure_aware

parse:
  ocr: false              # OCR (EasyOCR) is slow on CPU; needless for digital PDFs
  table_structure: true   # keep table detection (tables carry content)

qdrant:
  host: qdrant                    # service name on the container network
  port: 6333
  on_disk_vectors: false          # pi5: false (tiny corpus) | macmini: true
  quantization: none              # none | scalar  (macmini: scalar when corpus grows)

ingest:
  batch_size: 8                   # pi5: 8 (peak RAM < 8GB) | macmini: 64
  two_pass: true

manifest_path: /data/state/manifest.sqlite

# Optional file filters. Globs are matched against the doc_id (path relative to the
# subject dir, posix); fnmatch semantics, so `*` spans `/`. These are GLOBAL defaults
# unioned with each subject's own include/exclude. include = whitelist (if any
# include pattern exists at either level a file must match one); exclude = blacklist
# (exclude wins). Omit both = ingest every suffix-matched file (prior behaviour).
# include: ["*.pdf", "*.html"]
# exclude: ["*/draft/*"]

# --- docs-bridge SERVER only (ignored by the ingest-worker) -------------------
rerank:
  enabled: true
  model_dir: /opt/bge-reranker-onnx   # baked INT8 cross-encoder (built on the M2)
  int8: true
  max_length: 512                     # truncates each (query, passage) pair
  top_n: 30                           # rerank this many fused candidates, then cut to k

server:
  host: 0.0.0.0
  port: 8080
  default_k: 6                        # search(..., k=6) (design §9)
  prefetch_limit: 50                  # dense / sparse candidates each before RRF fusion

# N independent corpora; each its own dir + Qdrant collection (design §6).
# A subject may carry its own include/exclude (unioned with the global ones above) —
# e.g. a doxygen tree dropped in as-is, with its navigation/index pages excluded:
#   - name: teamcenter
#     dir: /data/docs/teamcenter
#     collection: teamcenter
#     exclude:                       # fnmatch globs (no brace expansion)
#       - "api/namespacemembers*.html"   # A-Z member indexes (+ the base page)
#       - "api/functions*.html"          # A-Z function indexes
#       - "api/*-members.html"           # per-class redundant "Member List" pages
#       - "api/annotated.html"
#       - "api/hierarchy.html"
#       - "api/files.html"
#       - "api/namespaces.html"
#       - "api/index.html"
#       - "api/pages.html"
#       - "api/dir_*.html"
#       - "api/search*.html"
subjects:
  - { name: teamcenter-aig, dir: /data/docs/aig, collection: aig }
  - { name: power-query,    dir: /data/docs/pq,  collection: pq }
